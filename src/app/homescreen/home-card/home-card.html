<mat-card class="home-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{ homeInfo.homeName }}</mat-card-title>
  </mat-card-header>
  <div class="home-card-content">
    <div>
      <img class="default-home-icon" mat-card-image src="home-icon-main.svg" alt="Home icon." />
    </div>
    <div class="entity-totals-container">
      <div class="entity">
        <img src="location-icon.svg" class="entity-icon" alt="Location icon." />
        <div class="total-items">{{ homeInfo.totalLocations }}</div>
      </div>
      <div class="entity">
        <img src="device-icon.svg" class="entity-icon" alt="Device icon." />
        <div class="total-items">{{ homeInfo.totalDevices }}</div>
      </div>
    </div>
  </div>
  <mat-card-actions class="button-container">
    <button matButton="outlined" (click)="viewHomeById()">View</button>
    <button matButton="filled" (click)="deleteHomeConfirmation()">
      <mat-icon>delete</mat-icon>Delete
    </button>
  </mat-card-actions>
</mat-card>
