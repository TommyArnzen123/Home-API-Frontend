<mat-card class="centered-content">
  <mat-card-title>Edit Location</mat-card-title>
  <br />
  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field>
        <input type="text" matInput placeholder="Location Name" formControlName="locationName" />
      </mat-form-field>
      <br />
      @if (form.get('locationName')?.touched && form.get('locationName')?.hasError('required')) {
        <mat-error>Please enter location name.</mat-error>
      }
      <br />
      @if (locationId()) {
        <div class="left-button">
          <button (click)="viewLocationById()" type="button" matButton>
            Return to View Location
          </button>
        </div>
      }
      <div class="right-button">
        <button (click)="update()" type="submit" matButton>Update Location</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
