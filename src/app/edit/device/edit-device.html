<mat-card class="centered-content">
  <mat-card-title>Edit Location</mat-card-title>
  <br />
  <mat-card-content>
    <form [formGroup]="form">
      <mat-form-field>
        <input type="text" matInput placeholder="Device Name" formControlName="deviceName" />
      </mat-form-field>
      <br />
      @if (form.get('deviceName')?.touched && form.get('deviceName')?.hasError('required')) {
        <mat-error>Please enter device name.</mat-error>
      }
      <br />
      @if (deviceId()) {
        <div class="left-button">
          <button (click)="viewDeviceById()" type="button" matButton>Return to View Device</button>
        </div>
      }
      <div class="right-button">
        <button (click)="update()" type="submit" matButton>Update Device</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
